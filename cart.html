<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Cart — The B&KERY</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Cart card – premium bakery aesthetic */
    .cart-wrap{max-width:1100px;margin:28px auto;padding:20px;padding-top:100px;display:grid;grid-template-columns:1fr 360px;gap:24px}

    .cart-items{background:transparent;border-radius:16px;padding: 0}

    .cart-item{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(82,47,28,0.08);display:block;padding:18px;margin-bottom:16px;transition:transform .22s ease,box-shadow .22s ease}
    .cart-item:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(82,47,28,0.12)}

    .cart-item-inner{display:grid;grid-template-columns:120px 1fr 110px;gap:18px;align-items:center}

    .cart-left img{width:120px;height:120px;object-fit:cover;border-radius:14px;display:block}

    .cart-center{display:flex;flex-direction:column;gap:8px}
    .item-name{font-size:1.05rem;font-weight:800;color:var(--brown);line-height:1.1}
    .item-unit{font-size:0.92rem;color:rgba(0,0,0,0.6)}

    .item-controls{display:flex;justify-content:flex-start;align-items:center;gap:16px;margin-top:6px}
    .qty-controls{display:flex;align-items:center;gap:10px}
    .qty-btn{width:40px;height:40px;border-radius:10px;border:1px solid rgb(146 146 146 / 50%);background:transparent;font-size:1.05rem;cursor:pointer;transition:background .18s ease,transform .18s ease}
    .qty-btn:hover{background:rgba(249,199,95,0.08);transform:translateY(-1px)}
    .qty-value{min-width:36px;text-align:center;font-weight:700}

    .remove-btn{background:transparent;border:none;color:var(--brown);font-weight:700;cursor:pointer;padding:6px}
    .remove-btn:hover{text-decoration:underline}

    .cart-right{text-align:right}
    .item-total{font-size:1.12rem;font-weight:800;color:var(--brown)}

    .empty-cart{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0px;text-align:center}

    .summary{background:#fff;border-radius:12px;padding:18px;box-shadow:0 6px 20px rgba(82,47,28,.06);height:max-content}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:10px;color:var(--brown)}
    .checkout-btn{display:block;width:100%;margin-top:12px}

    @media(max-width:900px){
      .cart-wrap{grid-template-columns:1fr;padding:14px;padding-top: 80px}
      .summary-sticky{position:static}
      .cart-item-inner{grid-template-columns:1fr;grid-auto-rows:auto}
      .cart-left img{width:100%;height:200px;border-radius:12px}
      .cart-right{text-align:left;margin-top:12px}
      .item-controls{flex-direction:row;flex-wrap:wrap;gap:12px}
      .qty-btn{width:44px;height:44px;border-radius:12px}
    }
  </style>
</head>
<body class="alan-sans">

    <nav aria-label="Main navigation">
      <div class="logo" aria-label="B&KERY Home">
        <a href="/"><img src="Logo.png" width="140" alt="The B&KERY logo"></a>
      </div>
      <div class="nav-actions">
        <button class="search-toggle" id="search-toggle" aria-label="Toggle product search" aria-expanded="false" aria-controls="search-container">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
        <div class="search-container" id="search-container" aria-hidden="true">
          <div class="search-input-wrapper">
            <input
              type="text"
              id="search-input"

              placeholder="Search treats..."

      </div>
      <div class="mobile-nav">
        <button class="search-toggle mobile-search-toggle" id="search-toggle-mobile" aria-label="Toggle product search" aria-expanded="false" aria-controls="search-container">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>

  <script>
    (function initMobileMenu(){
      const toggle = document.querySelector('.mobile-menu-toggle');
      const panel = document.getElementById('mobile-menu-panel');
      const backdrop = document.getElementById('mobile-menu-backdrop');
      const closeButton = document.querySelector('.mobile-menu-close');
      if(!toggle || !panel || !backdrop || !closeButton) return;

      const setOpen = open => {
        panel.classList.toggle('open', open);
        backdrop.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', String(open));
        panel.setAttribute('aria-hidden', String(!open));
      };

      toggle.addEventListener('click', () => setOpen(!panel.classList.contains('open')));
      closeButton.addEventListener('click', () => setOpen(false));
      backdrop.addEventListener('click', () => setOpen(false));
      panel.querySelectorAll('a').forEach(link => link.addEventListener('click', () => setOpen(false)));
    })();
  </script>

  <main>
    <div class="cart-wrap">
      <section class="cart-items" id="cart-items-section">
        <h2 style="margin-top:0; margin-bottom:16px">Your Basket</h2>
        <div id="cart-items"></div>
      </section>

      <aside class="summary summary-sticky" id="order-summary">
        <h3 style="margin-bottom:10px;">Order Summary</h3>
        <div class="summary-row"><span>Items</span><span id="summary-items">0</span></div>
        <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">$0.00</span></div>
        <div class="summary-row"><span>Delivery fee</span><span id="summary-delivery">$0.00</span></div>
        <div class="summary-row" style="font-size:1.05rem;font-weight:700"><span>Total</span><span id="summary-total">$0.00</span></div>

        <hr style="border:none;border-top:1px solid #f2e9e0;margin:12px 0" />

        <form id="customer-form">
          <div style="margin-bottom:8px">
            <label>Full name</label>
            <input id="cust-name" required class="order-input" />
          </div>
          <div style="margin-bottom:8px">
            <label>Phone number</label>
            <input id="cust-phone" required class="order-input" />
          </div>
          <div style="margin-bottom:8px">
            <label>Email address</label>
            <input id="cust-email" type="email" required class="order-input" />
          </div>

          <div style="margin-bottom:8px">
            <label>Pickup or Delivery</label>
            <div class="radio-group">
              <label><input type="radio" name="method" value="Pickup" checked /> Pickup</label>
              <label><input type="radio" name="method" value="Delivery" /> Delivery</label>
            </div>
          </div>

          <div id="delivery-address-block" style="display:none;margin-bottom:8px">
            <div style="margin-bottom:8px">
              <label>Address</label>
              <input id="cust-address" class="order-input" />
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              <div>
                <label>City</label>
                <input id="cust-city" class="order-input" />
              </div>
              <div>
                <label>State</label>
                <input id="cust-state" class="order-input" />
              </div>
              <div>
                <label>ZIP Code</label>
                <input id="cust-zip" class="order-input" />
              </div>
            </div>
          </div>

          <div style="margin-bottom:8px">
            <label>Requested date (optional)</label>
            <input id="cust-date" type="date" class="order-input" />
          </div>
          <div style="margin-bottom:8px">
            <label>Requested time (optional)</label>
            <input id="cust-time" type="time" class="order-input" />
          </div>
          <div style="margin-bottom:8px">
            <label>Special instructions (optional)</label>
            <textarea id="cust-notes" class="order-textarea" rows="3"></textarea>
          </div>
        </form>

        <div class="paypal-section" style="margin-top:18px">
          <p style="margin-bottom:14px;color:rgba(0,0,0,0.72);font-size:0.98rem;">When your order details are complete, pay securely with PayPal.</p>
          <div id="paypal-button-container"></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    (function(){
      const STORAGE_KEY = 'bk_cart';
      const LAST_ORDER_KEY = 'bk_last_order';
      const EMAILJS_SERVICE_ID = 'service_txo4c2j';
      const EMAILJS_PUBLIC_KEY = 'f-K_hQuzRnjD-QpbJ';
      const EMAILJS_TEMPLATE_CUSTOMER = 'template_bakery_customer';
      const EMAILJS_TEMPLATE_OWNER = 'template_bakery_owner';
      const EMAILJS_OWNER_EMAIL = 'bronxkaren1@gmail.com';
      const cartItemsEl = document.getElementById('cart-items');
      const summaryItems = document.getElementById('summary-items');
      const summarySubtotal = document.getElementById('summary-subtotal');
      const summaryDelivery = document.getElementById('summary-delivery');
      const summaryTotal = document.getElementById('summary-total');
      const cartCountEl = document.getElementById('cart-count');

      function loadCart(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; } }
      function saveCart(cart){ localStorage.setItem(STORAGE_KEY, JSON.stringify(cart)); }
      function saveLastOrder(order){ localStorage.setItem(LAST_ORDER_KEY, JSON.stringify(order)); }
      function getLastOrder(){ try{ return JSON.parse(localStorage.getItem(LAST_ORDER_KEY)||'null'); }catch(e){ return null; } }

      function formatMoney(n){ return '$'+(n||0).toFixed(2); }
      function generateOrderId(){ return 'BK-'+Date.now()+'-'+Math.floor(Math.random()*900+100); }

      function renderEmpty(){
        cartItemsEl.innerHTML = `<div class="empty-cart"><h3>Looks like your basket is empty. Let's fix that.</h3><p style="color:var(--brown)">Freshly baked treats are waiting.</p><a href="index.html#menu" class="btn btn-yellow" style="margin-top:14px">Browse Treats</a></div>`;
      }

      function renderCart(){
        const cart = loadCart();
        if(!cart || cart.length === 0){ renderEmpty(); updateSummary([],0,0); return; }
        cartItemsEl.innerHTML = '';
        cart.forEach(item => {
          const row = document.createElement('div');
          row.className = 'cart-item';
          row.innerHTML = `
            <div class="cart-item-inner">
              <div class="cart-left">
                <img src="${item.image||'images/Babka.jpg'}" alt="${item.name}">
              </div>
              <div class="cart-center">
                <div class="item-name">${item.name}</div>
                <div class="item-unit">Unit item: ${formatMoney(item.price)}</div>
                <div class="item-controls">
                  <div class="qty-controls">
                    <button class="qty-btn qty-decrease" data-id="${item.id}" aria-label="Decrease">-</button>
                    <div class="qty-value">${item.quantity}</div>
                    <button class="qty-btn qty-increase" data-id="${item.id}" aria-label="Increase">+</button>
                  </div>
                  <button class="remove-btn" data-id="${item.id}">Remove</button>
                </div>
              </div>
              <div class="cart-right">
                <div class="item-total">${formatMoney(item.price * item.quantity)}</div>
              </div>
            </div>
          `;
          cartItemsEl.appendChild(row);
        });
        attachItemHandlers();
        updateSummary(cart);
      }

      function updateSummary(cart,deliveryFee=0,anim=false){
        cart = cart || loadCart();
        const items = cart.reduce((s,i)=>s+(i.quantity||0),0);
        const subtotal = cart.reduce((s,i)=>s + (i.price||0)*(i.quantity||0),0);
        const delivery = deliveryFee || 0;
        const total = subtotal + delivery;
        summaryItems.textContent = items;
        summarySubtotal.textContent = formatMoney(subtotal);
        summaryDelivery.textContent = formatMoney(delivery);
        summaryTotal.textContent = formatMoney(total);
        if(cartCountEl){ cartCountEl.textContent = items; }
      }

      function attachItemHandlers(){
        document.querySelectorAll('.qty-decrease').forEach(btn=>btn.addEventListener('click',()=>{
          const id = btn.getAttribute('data-id'); changeQty(id, -1);
        }));
        document.querySelectorAll('.qty-increase').forEach(btn=>btn.addEventListener('click',()=>{
          const id = btn.getAttribute('data-id'); changeQty(id, +1);
        }));
        document.querySelectorAll('.remove-btn').forEach(btn=>btn.addEventListener('click',()=>{
          const id = btn.getAttribute('data-id'); removeItem(id);
        }));
      }

      function changeQty(id, delta){
        const cart = loadCart();
        const it = cart.find(i=>i.id===id); if(!it) return;
        it.quantity = Math.max(0,(it.quantity||0) + delta);
        if(it.quantity === 0) { const idx = cart.findIndex(i=>i.id===id); if(idx>-1) cart.splice(idx,1); }
        saveCart(cart); renderCart();
      }

      function removeItem(id){ const cart = loadCart(); const idx = cart.findIndex(i=>i.id===id); if(idx>-1) cart.splice(idx,1); saveCart(cart); renderCart(); }

      // Customer form handling
      const form = document.getElementById('customer-form');

      function getCheckoutValues(){
        const name = document.getElementById('cust-name').value.trim();
        const phone = document.getElementById('cust-phone').value.trim();
        const email = document.getElementById('cust-email').value.trim();
        const method = form.querySelector('input[name="method"]:checked').value;
        const address = document.getElementById('cust-address').value.trim();
        const city = document.getElementById('cust-city').value.trim();
        const state = document.getElementById('cust-state').value.trim();
        const zip = document.getElementById('cust-zip').value.trim();
        const date = document.getElementById('cust-date').value;
        const time = document.getElementById('cust-time').value;
        const notes = document.getElementById('cust-notes').value.trim();

        return { name, phone, email, method, address, city, state, zip, date, time, notes };
      }

      function validateCheckoutForm(){
        const values = getCheckoutValues();
        const errors = [];

        if(!values.name) errors.push('Full Name is required.');
        if(!values.phone) errors.push('Phone Number is required.');
        if(!values.email) errors.push('Email Address is required.');
        if(values.method === 'Delivery'){
          if(!values.address) errors.push('Delivery address is required for delivery.');
          if(!values.city) errors.push('Delivery city is required.');
          if(!values.state) errors.push('Delivery state is required.');
          if(!values.zip) errors.push('Delivery ZIP code is required.');
        }

        if(errors.length){
          return { valid: false, errors, checkout: null };
        }

        const formattedAddress = values.method === 'Delivery'
          ? `${values.address}, ${values.city}, ${values.state} ${values.zip}`
          : '';

        const checkout = {
          name: values.name,
          phone: values.phone,
          email: values.email,
          method: values.method,
          address: formattedAddress,
          city: values.city,
          state: values.state,
          zip: values.zip,
          scheduleDate: values.date,
          scheduleTime: values.time,
          notes: values.notes,
          savedAt: new Date().toISOString()
        };

        localStorage.setItem('bk_checkout', JSON.stringify(checkout));
        return { valid: true, errors: [], checkout };
      }

      function setDeliveryVisibility(){
        const delivery = form.querySelector('input[name="method"]:checked').value === 'Delivery';
        document.getElementById('delivery-address-block').style.display = delivery ? 'block' : 'none';
        updateSummary(null, delivery ? 5 : 0);
      }

      form.addEventListener('change', (e)=>{
        if(e.target.name === 'method'){
          setDeliveryVisibility();
        }
      });

      async function createOrderOnServer(orderPayload){
        try {
          const response = await fetch('/api/create-paypal-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderPayload)
          });

          const result = await response.json();
          if(!response.ok){
            console.error('Server order creation failed', result);
            throw new Error(result.message || 'Unable to create PayPal order');
          }

          if(!result.id){
            throw new Error('PayPal order creation returned no ID');
          }

          return result.id;
        } catch (error) {
          console.error('Error creating PayPal order on server:', error);
          throw error;
        }
      }

      function buildPayPalPurchaseUnits(orderPayload){
        return [{
          amount: {
            currency_code: 'USD',
            value: (orderPayload.total || 0).toFixed(2),
            breakdown: {
              item_total: {
                currency_code: 'USD',
                value: (orderPayload.subtotal || 0).toFixed(2)
              },
              shipping: {
                currency_code: 'USD',
                value: (orderPayload.deliveryFee || 0).toFixed(2)
              }
            }
          },
          items: (orderPayload.items || []).map(item => ({
            name: item.name || 'Bakery item',
            unit_amount: {
              currency_code: 'USD',
              value: (parseFloat(item.price) || 0).toFixed(2)
            },
            quantity: String(item.quantity || 1),
            description: item.description || item.name || 'Bakery treat',
            sku: item.id || item.name || ''
          }))
        }];
      }

      function initEmailJS(){
        if(window.emailjs && !window.emailjs._bakeryEmailJSInit){
          emailjs.init(EMAILJS_PUBLIC_KEY);
          window.emailjs._bakeryEmailJSInit = true;
        }
      }

      function formatEmailJSItems(items){
        return items.map(item => `${item.quantity} × ${item.name} — $${((item.price||0)*item.quantity).toFixed(2)}`).join('\n');
      }

      async function sendEmailJSMessage(templateId, templateParams){
        if(!window.emailjs){
          throw new Error('EmailJS is not loaded');
        }
        initEmailJS();
        return emailjs.send(EMAILJS_SERVICE_ID, templateId, templateParams);
      }

      async function sendOrderEmails(orderRecord){
        const emailPayload = {
          order_id: orderRecord.orderId,
          customer_name: orderRecord.name,
          customer_email: orderRecord.email,
          customer_phone: orderRecord.phone,
          order_items: formatEmailJSItems(orderRecord.items),
          order_subtotal: orderRecord.subtotal.toFixed(2),
          order_delivery_fee: orderRecord.deliveryFee.toFixed(2),
          order_total: orderRecord.total.toFixed(2),
          order_method: orderRecord.method,
          order_address: orderRecord.address || 'Pickup',
          order_schedule: orderRecord.schedule || 'N/A',
          order_notes: orderRecord.notes || 'None',
          paypal_transaction_id: orderRecord.paypalTransactionId || 'N/A',
          bakery_name: 'The B&KERY',
          bakery_email: EMAILJS_OWNER_EMAIL,
          recipient_email: orderRecord.email,
          recipient_name: orderRecord.name
        };

        if(window.emailjs){
          try {
            await Promise.all([
              sendEmailJSMessage(EMAILJS_TEMPLATE_CUSTOMER, {
                ...emailPayload,
                to_email: orderRecord.email,
                to_name: orderRecord.name
              }),
              sendEmailJSMessage(EMAILJS_TEMPLATE_OWNER, {
                ...emailPayload,
                to_email: EMAILJS_OWNER_EMAIL,
                to_name: 'Karen & Bruce'
              })
            ]);
            return;
          } catch (error) {
            console.warn('EmailJS send failed, falling back to server email:', error);
          }
        }

        try {
          await fetch('/api/send-confirmation-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: orderRecord.email,
              name: orderRecord.name,
              orderData: orderRecord,
              total: orderRecord.total.toFixed(2)
            })
          });
        } catch (error) {
          console.warn('Email notification failed:', error);
        }
      }

      function loadPayPalSdk(){
        const clientId = 'AcBPikCR5CBX4jordTLtGan7voqCqZ3QthwhjH0wQ0d2KExU0YSlUapcvGUrwY9VGgEIDvcfZYvVcuHT';
        if(!clientId){
          console.error('PayPal client ID is missing in cart.html');
          return;
        }

        const script = document.createElement('script');
        script.src = `https://www.paypal.com/sdk/js?client-id=${clientId}&currency=USD&intent=capture&components=buttons`;
        script.async = true;
        script.onload = () => {
          console.info('PayPal SDK loaded');
          renderPayPalButtons();
        };
        script.onerror = () => {
          console.error('Could not load PayPal SDK.');
        };

        document.head.appendChild(script);
      }

      function buildOrderRecord(captureDetails, cart, checkout){
        const subtotal = cart.reduce((sum,item)=>sum + (parseFloat(item.price)||0)*(parseInt(item.quantity)||0),0);
        const deliveryFee = checkout.method === 'Delivery' ? 5 : 0;
        const total = subtotal + deliveryFee;
        const schedule = [checkout.scheduleDate, checkout.scheduleTime].filter(Boolean).join(' at ');
        const orderId = `BK-${new Date().getFullYear()}-${Math.floor(Math.random()*9000)+1000}`;

        return {
          orderId,
          name: checkout.name,
          phone: checkout.phone,
          email: checkout.email,
          method: checkout.method,
          address: checkout.address,
          city: checkout.city,
          state: checkout.state,
          zip: checkout.zip,
          schedule,
          notes: checkout.notes,
          items: cart,
          subtotal,
          deliveryFee,
          total,
          paypalTransactionId: captureDetails.purchase_units?.[0]?.payments?.captures?.[0]?.id || captureDetails.id || '',
          paymentStatus: captureDetails.status || 'COMPLETED',
          capturedAt: new Date().toISOString(),
          createdAt: new Date().toISOString()
        };
      }

      function renderPayPalButtons(){
        if(!window.paypal){
          return setTimeout(renderPayPalButtons, 100);
        }

        paypal.Buttons({
          style: {
            layout: 'vertical',
            color: 'gold',
            shape: 'pill',
            label: 'paypal',
            height: 48
          },

          onClick: async (data, actions) => {
            const { valid, errors } = validateCheckoutForm();
            if(!valid){
              alert(errors.join('\n'));
              return actions.reject();
            }
            return actions.resolve();
          },

          createOrder: async (data, actions) => {
            const cart = loadCart();
            if(!cart || cart.length === 0){
              alert('Your cart is empty. Add some treats before checking out.');
              throw new Error('Cart is empty');
            }

            const { valid, checkout, errors } = validateCheckoutForm();
            if(!valid){
              alert(errors.join('\n'));
              throw new Error('Checkout form validation failed');
            }

            const payload = {
              orderId: `BK-${new Date().getFullYear()}-${Math.floor(Math.random()*9000)+1000}`,
              items: cart.map(item => ({
                id: item.id || item.sku || item.name,
                name: item.name || 'Bakery item',
                price: parseFloat(item.price) || 0,
                quantity: parseInt(item.quantity) || 1,
                description: item.description || item.name || 'Bakery treat'
              })),
              checkout,
              subtotal: cart.reduce((sum,item)=>sum + (parseFloat(item.price)||0)*(parseInt(item.quantity)||0),0),
              deliveryFee: checkout.method === 'Delivery' ? 5 : 0
            };
            payload.total = payload.subtotal + payload.deliveryFee;

            try {
              const orderId = await createOrderOnServer(payload);
              localStorage.setItem('bk_checkout', JSON.stringify(checkout));
              localStorage.setItem('bk_last_order', JSON.stringify({ ...payload, orderId, checkout }));
              return orderId;
            } catch (error) {
              console.warn('Server order creation failed; falling back to client-side PayPal order:', error);
              localStorage.setItem('bk_checkout', JSON.stringify(checkout));
              localStorage.setItem('bk_last_order', JSON.stringify({ ...payload, orderId: '', checkout }));
              return actions.order.create({
                purchase_units: buildPayPalPurchaseUnits(payload),
                application_context: {
                  brand_name: 'The B&KERY',
                  user_action: 'PAY_NOW'
                }
              });
            }
          },

          onApprove: async (data) => {
            const captureDetails = await actions.order.capture();
            const cart = loadCart();
            const checkout = JSON.parse(localStorage.getItem('bk_checkout') || 'null') || {};
            const orderRecord = buildOrderRecord(captureDetails, cart, checkout);
            saveLastOrder(orderRecord);
            await sendOrderEmails(orderRecord);
            saveCart([]);
            window.location.href = `success.html?orderId=${encodeURIComponent(orderRecord.orderId)}`;
          },

          onCancel: () => {
            window.location.href = 'cancel.html';
          },

          onError: (err) => {
            console.error('PayPal checkout error', err);
            alert('There was a problem with the PayPal checkout. Please try again.');
          }
        }).render('#paypal-button-container');
      }

      // initial render
      renderCart();
      setDeliveryVisibility();
      loadPayPalSdk();
    })();

  </script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</body>
</html>
