<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — The B&KERY</title>
<link rel="stylesheet" href="styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
  .admin-shell{max-width:1400px;margin:106px auto;padding:20px}
  .admin-header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:24px}
  .admin-title{margin:0;font-size:32px;color:var(--brown)}
  .admin-sub{margin:6px 0 0;color:var(--lighter-black)}
  .admin-toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .admin-search{padding:10px 14px;border-radius:12px;border:1px solid rgba(82,47,28,.12);min-width:220px;font-size:14px}
  .admin-filters{display:flex;gap:8px;flex-wrap:wrap}
  .filter-btn{padding:8px 14px;border-radius:999px;border:1px solid rgba(82,47,28,.08);background:transparent;color:var(--brown);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
  .filter-btn:hover{background:rgba(82,47,28,.04)}
  .filter-btn.active{background:var(--yellow);border-color:rgba(82,47,28,.1)}
  .filter-divider{width:1px;height:24px;background:rgba(82,47,28,.12);margin:0 4px;flex-shrink:0}

  .orders-table-wrap{overflow-x:auto;background:#fff;border-radius:18px;box-shadow:0 12px 30px rgba(82,47,28,0.08);margin-top:18px}
  .orders-table-wrap::-webkit-scrollbar{height:10px}
  .orders-table-wrap::-webkit-scrollbar-thumb{background:rgba(82,47,28,.18);border-radius:999px}
  .orders-table{width:100%;border-collapse:collapse;font-size:14px;min-width:1400px}
  table.orders-table thead{background:var(--cream)}
  table.orders-table th{padding:14px 16px;text-align:left;font-weight:700;color:var(--brown);font-size:13px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid rgba(82,47,28,.08);white-space:nowrap}
  table.orders-table td{padding:14px 16px;border-bottom:1px solid rgba(82,47,28,.05);vertical-align:top;color:var(--black)}
  table.orders-table tbody tr{cursor:pointer;transition:background .12s}
  table.orders-table tbody tr:hover{background:rgba(249,199,95,0.08)}
  table.orders-table .order-id{font-weight:800;color:var(--brown);font-size:13px}
  table.orders-table .order-total{font-weight:800;color:var(--brown);font-size:14px}
  .status-pill{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap}
  .status-order-received{background:#fef3c7;color:#92400e}
  .status-preparing{background:#d6a58a;color:#fff}
  .status-ready{background:#fde68a;color:#92400e}
  .status-completed{background:#6ee7b7;color:#065f46}
  .status-paid{background:#a7f3d0;color:#065f46}
  .status-failed{background:#fecaca;color:#991b1b}

  .empty-state{display:flex;flex-direction:column;align-items:center;gap:18px;padding:60px;text-align:center}
  .empty-ill{width:160px;height:130px;background:linear-gradient(180deg,#fff,rgba(249,199,95,0.06));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:56px}

  .detail-panel{border-top:1px solid rgba(82,47,28,.08);padding:18px 20px;background:linear-gradient(180deg,rgba(249,199,95,0.03),#fff)}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .detail-section{margin-bottom:14px}
  .detail-section h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--brown)}
  .detail-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(82,47,28,.04)}
  .detail-row .label{color:var(--lighter-black);font-weight:500}
  .detail-row .value{color:var(--black);font-weight:600;text-align:right;max-width:60%}
  .items-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .items-table th{background:rgba(249,199,95,0.15);padding:8px 10px;text-align:left;font-weight:700;color:var(--brown)}
  .items-table td{padding:8px 10px;border-bottom:1px solid rgba(82,47,28,.04)}
  .notes-box{background:rgba(249,199,95,0.08);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--brown);font-style:italic;margin-top:4px}

  .pwd-screen{max-width:460px;margin:120px auto;padding:40px;background:#fff;border-radius:18px;box-shadow:0 12px 30px rgba(82,47,28,0.1);text-align:center}
  .pwd-screen h2{color:var(--brown);margin-bottom:8px}
  .pwd-screen p{color:var(--lighter-black);margin-bottom:20px;font-size:14px}
  .pwd-input{padding:12px 14px;border-radius:10px;border:1px solid rgba(82,47,28,.15);width:100%;font-size:14px;margin-bottom:12px;font-family:inherit}
  .pwd-row{display:flex;align-items:center;margin-bottom:14px;font-size:13px;color:var(--lighter-black)}
  .pwd-row label{display:inline-flex;align-items:center;gap:4px;cursor:pointer}
  .pwd-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--brown);flex-shrink:0}
  .pwd-error{color:#dc2626;font-size:13px;margin-bottom:10px;display:none}
  .btn{padding:10px 20px;border-radius:999px;font-weight:700;cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:all .15s}
  .btn-brown{background:var(--brown);color:#fff}
  .btn-brown:hover{opacity:.9}
  .btn-ghost{background:transparent;color:var(--brown);text-decoration:none}
  .btn-ghost:hover{opacity:.75}

  .admin-meta-bar{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px;font-size:13px;color:var(--lighter-black)}
  .admin-meta-bar strong{color:var(--brown)}

  @media(max-width:900px){
    .detail-grid{grid-template-columns:1fr}
    .admin-shell{margin-top:96px}
  }
</style>
</head>
<body class="alan-sans">

<div id="pwd-gate" class="pwd-screen">
  <div style="font-size:48px;margin-bottom:12px">🔒</div>
  <h2>Admin Access</h2>
  <p>Enter the admin password to view orders.</p>
  <div class="pwd-error" id="pwd-error">Incorrect password</div>
  <input type="password" id="admin-password" class="pwd-input" placeholder="Password" autocomplete="current-password" />
  <div class="pwd-row">
    <label><input type="checkbox" id="keep-session" /> Keep me logged in</label>
  </div>
  <button class="btn btn-brown" style="width:100%" onclick="checkPassword()">Sign In</button>
  <p style="margin-top:14px;font-size:12px;color:var(--gray)">Tip: ask Karen for the password.</p>
</div>

<div id="admin-panel" style="display:none">
<header id="header" aria-label="Site header">
  <nav aria-label="Main navigation">
    <div class="logo" aria-label="B&KERY Home">
      <a href="index.html" onclick="location.reload();return false"><img src="Logo.png" width="140" alt="The B&KERY logo"></a>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost" onclick="logout()" style="font-size:13px">Logout</button>
    </div>
  </nav>
</header>

<main class="admin-shell" id="admin-main">
  <div class="admin-header">
    <div>
      <h1 class="admin-title">📦 Order Management</h1>
      <p class="admin-sub">All orders made by customers.</p>
    </div>
    <div class="admin-toolbar">
      <input id="admin-search" class="admin-search" placeholder="Search by ID, name, email, or item…" oninput="renderAdmin()" />
      <div class="admin-filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
        <button class="filter-btn" data-filter="Pending" onclick="setFilter(this,'Pending')">Pending</button>
        <button class="filter-btn" data-filter="Completed" onclick="setFilter(this,'Completed')">Completed</button>
        <div class="filter-divider"></div>
        <button class="filter-btn" data-filter="Pickup" onclick="setFilter(this,'Pickup')">Pickup</button>
        <button class="filter-btn" data-filter="Delivery" onclick="setFilter(this,'Delivery')">Delivery</button>
      </div>
    </div>
  </div>

  <div class="admin-meta-bar" id="admin-meta"></div>
  <div id="admin-content"></div>
</main>
</div>

<script>
const ADMIN_PASSWORD = 'bake';
const STORAGE_KEY = 'bk_orders';

function checkPassword(){
  const val = document.getElementById('admin-password').value;
  const keepLogged = document.getElementById('keep-session').checked;
  if(!val){ return; }
  if(val === ADMIN_PASSWORD){
    document.getElementById('pwd-gate').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    if(keepLogged){
      try { sessionStorage.setItem('bk_admin_session', '1'); } catch(e){}
    } else {
      try { sessionStorage.removeItem('bk_admin_session'); } catch(e){}
    }
    renderAdmin();
  } else {
    const err = document.getElementById('pwd-error');
    err.style.display = 'block';
    document.getElementById('admin-password').value = '';
    setTimeout(()=> err.style.display='none', 3000);
  }
}
document.getElementById('admin-password')?.addEventListener('keydown', e=>{ if(e.key==='Enter') checkPassword(); });

function logout(){
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('pwd-gate').style.display = 'block';
  document.getElementById('admin-password').value = '';
  try { sessionStorage.removeItem('bk_admin_session'); } catch(e){}
}

(function restoreSession(){
  try { if(sessionStorage.getItem('bk_admin_session') === '1'){ document.getElementById('pwd-gate').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; renderAdmin(); } } catch(e){}
})();

let activeFilter = 'all';

function setFilter(btn, filter){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;
  renderAdmin();
}

function statusBadge(status){
  const s = (status||'').toLowerCase();
  const map = {
    'completed': 'status-completed',
    'delivered': 'status-completed',
    'ready': 'status-ready',
    'ready for pickup': 'status-ready',
    'preparing': 'status-preparing',
    'order received': 'status-order-received',
    'paid': 'status-paid',
    'pending': 'status-failed',
    'failed': 'status-failed',
    'captured': 'status-paid',
    'approved': 'status-paid'
  };
  let cls = 'status-order-received';
  for(const [k,v] of Object.entries(map)){ if(s.includes(k)){ cls=v; break; } }
  return `<span class="status-pill ${cls}">${escapeHtml(status||'—')}</span>`;
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatCurrency(n){
  const num = parseFloat(n);
  if(isNaN(num)) return '$0.00';
  return '$' + num.toFixed(2);
}

function formatDate(iso){
  if(!iso) return '—';
  try { return new Date(iso).toLocaleString(); } catch(e){ return iso; }
}

function getItemsHtml(items){
  if(!items || !items.length) return '<div style="color:var(--gray);font-style:italic">No items</div>';
  let rows = items.map(it=>{
    const qty = Number(it.quantity || it.qty || 1);
    const name = escapeHtml(it.name || it.productName || 'Item');
    const price = Number(it.price || it.unitPrice || 0);
    const lineTotal = (price * qty).toFixed(2);
    return `<tr><td>${name}</td><td style="text-align:center">${qty}</td><td style="text-align:right">$${price.toFixed(2)}</td><td style="text-align:right;font-weight:700">$${lineTotal}</td></tr>`;
  }).join('');
  return `<table class="items-table"><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Line Total</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function loadOrders(){
  const raw = localStorage.getItem(STORAGE_KEY);
  let localOrders = [];
  try { localOrders = JSON.parse(raw) || []; } catch(e) { localOrders = []; }
  return { raw, localOrders };
}

async function fetchGlobalOrders(){
  try {
    const resp = await fetch('/api/orders');
    if (resp.ok) {
      const globalOrders = await resp.json();
      if (Array.isArray(globalOrders)) return globalOrders;
    }
  } catch(e) {}
  return [];
}

async function renderAdmin(){
  const globalOrders = await fetchGlobalOrders();
  const { localOrders } = loadOrders();
  let orders = [...globalOrders];
  const globalIds = new Set(globalOrders.map(o => o.orderId));
  for (const local of localOrders) {
   if (!globalIds.has(local.orderId)) {
    orders.push(local);
   }
  }
  orders.sort((a, b) => {
   const da = new Date(b.createdAt || b.capturedAt || b.dateOrdered || 0);
   const db = new Date(a.createdAt || a.capturedAt || a.dateOrdered || 0);
   return da - db;
  });

  if(!orders.length){
   document.getElementById('admin-meta').innerHTML = '';
   document.getElementById('admin-content').innerHTML = renderEmpty('No orders yet. They will appear here once customers place them.');
   return;
  }

  let filtered = orders;
  const searchQ = (document.getElementById('admin-search').value||'').trim().toLowerCase();

  if(activeFilter === 'Pickup'){
   filtered = orders.filter(o => (o.method||'').toLowerCase() === 'pickup');
  } else if(activeFilter === 'Delivery'){
   filtered = orders.filter(o => (o.method||'').toLowerCase() === 'delivery');
  } else if(activeFilter === 'Pending'){
   filtered = orders.filter(o => {
    const s = (o.status||o.paymentStatus||'').toLowerCase();
    return !(s.includes('completed') || s.includes('delivered'));
   });
  } else if(activeFilter === 'Completed'){
   filtered = orders.filter(o => {
    const s = (o.status||o.paymentStatus||'').toLowerCase();
    return s.includes('completed') || s.includes('delivered');
   });
  }

  if(searchQ){
   filtered = filtered.filter(o => {
    const id = (o.orderId||o.orderNumber||'').toLowerCase();
    const name = (o.name||'').toLowerCase();
    const email = (o.email||'').toLowerCase();
    const phone = (o.phone||o.customerPhone||'').toLowerCase();
    const inItems = (o.items||o.purchasedItems||[]).some(it => (it.name||it.productName||'').toLowerCase().includes(searchQ));
    const notes = (o.notes||'').toLowerCase();
    return id.includes(searchQ) || name.includes(searchQ) || email.includes(searchQ) || phone.includes(searchQ) || inItems || notes.includes(searchQ);
   });
  }

  document.getElementById('admin-meta').innerHTML = `Showing <strong>${filtered.length}</strong> of <strong>${orders.length}</strong> orders`;

  if(!filtered.length){
   document.getElementById('admin-content').innerHTML = renderEmpty('No orders match your search/filter.');
   return;
  }

  const rows = filtered.map((o, idx) => {
   const id = o.orderId || o.orderNumber || `#${idx+1}`;
   const customer = escapeHtml(o.name||'—');
   const emailRaw = o.email||'—';
   const emailMailto = encodeURIComponent(emailRaw);
   const emailDisplay = escapeHtml(emailRaw);
   const phone = escapeHtml(o.phone||o.customerPhone||'—');
   const method = escapeHtml(o.method||'Pickup');
   const address = [o.address, o.city, o.state, o.zip].filter(Boolean).map(escapeHtml).join(', ') || '—';
   const schedule = escapeHtml(o.schedule||'—');
   const notes = escapeHtml(o.notes||'');
   const sub = formatCurrency(o.subtotal||0);
   const fee = formatCurrency(o.deliveryFee||0);
   const tot = formatCurrency(o.total||o.totalPaid||0);
   const payPalId = escapeHtml(o.paypalTransactionId||o.paymentId||o.transactionId||'—');
   const payStatus = escapeHtml(o.paymentStatus||o.status||'—');
   const created = formatDate(o.createdAt||o.dateOrdered||o.capturedAt);

   const details = `
     <div class="detail-grid">
       <div>
         <div class="detail-section"><h4>Customer</h4>
           <div class="detail-row"><span class="label">Name</span><span class="value">${customer}</span></div>
           <div class="detail-row"><span class="label">Email</span><span class="value"><a href="mailto:${emailMailto}?body=${encodeURIComponent('Hi there')}">${emailDisplay}</a></span></div>
           <div class="detail-row"><span class="label">Phone</span><span class="value">${phone}</span></div>
         </div>
         <div class="detail-section"><h4>Order</h4>
           <div class="detail-row"><span class="label">Method</span><span class="value">${method}</span></div>
           ${o.pickupLocation && !o.address ? `<div class="detail-row"><span class="label">Pickup Location</span><span class="value">${escapeHtml(o.pickupLocation)}</span></div>` : ''}
           ${address!=='—'?`<div class="detail-row"><span class="label">${o.pickupLocation && !o.address ? 'Location' : 'Address'}</span><span class="value">${address}</span></div>`:''}
           <div class="detail-row"><span class="label">Schedule</span><span class="value">${schedule}</span></div>
           ${notes?`<div class="detail-row" style="display:block"><span class="label">Special Instructions</span><div class="notes-box">${notes}</div></div>`:''}
         </div>
         <div class="detail-section"><h4>Payment</h4>
           <div class="detail-row"><span class="label">Status</span><span class="value">${statusBadge(payStatus)}</span></div>
           <div class="detail-row"><span class="label">PayPal ID</span><span class="value" style="font-size:11px;word-break:break-all">${payPalId}</span></div>
           <div class="detail-row"><span class="label">Created</span><span class="value">${created}</span></div>
         </div>
       </div>
       <div>
         <div class="detail-section"><h4>Items</h4>
           ${getItemsHtml(o.items||o.purchasedItems)}
           <div class="detail-row" style="margin-top:10px"><span class="label">Subtotal</span><span class="value">${sub}</span></div>
           ${o.deliveryFee?`<div class="detail-row"><span class="label">Delivery Fee</span><span class="value">${fee}</span></div>`:''}
           <div class="detail-row"><span class="label" style="font-weight:800">Total</span><span class="value" style="font-weight:800;font-size:15px">${tot}</span></div>
         </div>
       </div>
     </div>`;

   return `<tr onclick="toggleDetails(this)" aria-expanded="false">
     <td class="order-id">${id}</td>
     <td>${customer}</td>
     <td><a href="mailto:${emailMailto}?body=${encodeURIComponent('Hi there')}" style="color:var(--brown)">${emailDisplay}</a></td>
     <td>${phone}</td>
     <td>${method}</td>
     <td style="white-space:nowrap">${schedule}</td>
     <td style="white-space:nowrap">${escapeHtml(o.pickupLocation||'')}</td>
     <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(o.notes||'')}">${notes||''}</td>
     <td class="order-total">${tot}</td>
     <td>${statusBadge(payStatus)}</td>
     <td style="text-align:right;font-size:16px;color:var(--brown)">▼</td>
   </tr><tr class="detail-row-wrapper"><td colspan="11" style="padding:0"><div class="detail-panel" style="display:none">${details}</div></td></tr>`;
  }).join('');

  document.getElementById('admin-content').innerHTML = `
    <div class="orders-table-wrap">
      <table class="orders-table">
        <thead><tr>
          <th>Order ID</th><th>Customer</th><th>Email</th><th>Phone</th><th>Method</th><th>Schedule</th><th>Pickup/Address</th><th>Notes</th><th>Total</th><th>Payment</th><th style="text-align:right"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function toggleDetails(row){
  const wrapper = row.nextElementSibling;
  const panel = wrapper?.querySelector('.detail-panel');
  if(!panel) return;
  const expanded = row.getAttribute('aria-expanded') === 'true';
  row.setAttribute('aria-expanded', String(!expanded));
  panel.style.display = expanded ? 'none' : 'block';
  const chevron = row.querySelector('td:last-child');
  if(chevron) chevron.textContent = expanded ? '▼' : '▲';
}

function renderEmpty(msg){
  return `<div class="empty-state" style="margin-top:24px">
    <div class="empty-ill">📭</div>
    <h3 style="margin:0;color:var(--brown)">${escapeHtml(msg)}</h3>
  </div>`;
}

</script>
</body>
</html>
