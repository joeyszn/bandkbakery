<style>
  /* Orders page specific styles — follow B&KERY theme */
  .orders-shell{max-width:1100px;margin:106px auto;padding:20px}
  .orders-header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .orders-title{margin:0;font-size:32px;color:var(--brown)}
  .orders-sub{margin:6px 0 0;color:var(--lighter-black)}
  .orders-toolbar{display:flex;gap:12px;align-items:center}
  .orders-search{padding:10px 12px;border-radius:12px;border:1px solid rgba(82,47,28,.08);min-width:260px}
  .orders-filters{display:flex;gap:8px}
  .filter-btn{padding:8px 12px;border-radius:999px;border:1px solid rgba(82,47,28,.06);background:transparent;color:var(--brown);cursor:pointer}
  .filter-btn.active{background:var(--yellow);border-color:rgba(82,47,28,.06)}

  .orders-list{margin-top:18px;display:grid;gap:18px}
  .order-card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(82,47,28,0.08);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
  .order-summary{display:flex;flex-direction:column;gap:8px}
  .order-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .order-number{font-weight:800;color:var(--brown)}
  .order-date{color:#6d4a2d}
  .order-total{font-weight:900;color:var(--brown)}
  .order-method{color:rgba(0,0,0,.7)}

  .status-badge{padding:8px 12px;border-radius:999px;font-weight:800}
  .status-order-received{background:var(--yellow);color:#3d2113}
  .status-preparing{background:#8b5e46;color:#fff}
  .status-ready{background:#f6c85a;color:#3d2113}
  .status-completed{background:#4caf50;color:#fff}
  .status-pending{background:#ff9800;color:#fff}

  .order-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .details-panel{margin-top:12px;border-radius:12px;padding:12px;background:linear-gradient(180deg,rgba(249,199,95,0.04),#fff);display:none}
  .items-list{display:grid;gap:8px}
  .item-row{display:flex;justify-content:space-between;gap:12px}
  .item-left{color:var(--brown);font-weight:700}
  .item-right{color:#6d4a2d; font-weight: 700;}

  .notice{margin-top:8px;color:var(--brown);font-weight:700}
  .empty-state{display:flex;flex-direction:column;align-items:center;gap:18px;padding:48px;border-radius:18px;background:linear-gradient(180deg,rgba(249,199,95,0.06),#fff);box-shadow:0 10px 28px rgba(82,47,28,0.06)}
  .empty-ill{width:180px;height:140px;background:linear-gradient(180deg,#fff,rgba(249,199,95,0.06));border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--brown);font-weight:900}

  @media(max-width:900px){
    .order-card{grid-template-columns:1fr;}
    .order-actions{align-items:flex-start}
  }

  @media(max-width:600px){
    .orders-toolbar{align-items:stretch;flex-direction:column; width:100%;}
    .orders-search{width:100%;min-width:0}
    .orders-filters{width:100%;flex-direction:column}
    .filter-btn{width:100%}
  }
</style>
</head>

  <script>
    (function initMobileMenu(){
      const toggle = document.querySelector('.mobile-menu-toggle');
      const panel = document.getElementById('mobile-menu-panel');
      const backdrop = document.getElementById('mobile-menu-backdrop');
      const closeButton = document.querySelector('.mobile-menu-close');
      if(!toggle || !panel || !backdrop || !closeButton) return;

      const setOpen = open => {
        panel.classList.toggle('open', open);
        backdrop.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', String(open));
        panel.setAttribute('aria-hidden', String(!open));
      };

      const closeMenu = () => setOpen(false);
      const toggleMenu = () => setOpen(!panel.classList.contains('open'));

      toggle.addEventListener('click', toggleMenu);
      closeButton.addEventListener('click', closeMenu);
      backdrop.addEventListener('click', closeMenu);
      panel.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));
    })();
  </script>

<script>
  // Orders page script — reads bk_orders from localStorage and renders cards
  (function(){
    const STORAGE_KEY = 'bk_orders';
    const DRAFT_STORAGE_KEY = 'bk_pending_orders';

    function readOrders(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return [];
        return JSON.parse(raw) || [];
      }catch(e){
        console.error('Failed to parse orders', e);
        return [];
      }
    }

    function readPendingOrders(){
      try{
        const raw = localStorage.getItem(DRAFT_STORAGE_KEY);
        if(!raw) return [];
        return JSON.parse(raw) || [];
      }catch(e){
        return [];
      }
    }

    async function readAllGlobalOrders(){
      try {
        const resp = await fetch('/api/orders');
        if (resp.ok) {
          const data = await resp.json();
          return Array.isArray(data) ? data : [];
        }
        const errText = await resp.text().catch(() => 'Unknown error');
        console.error('Failed to fetch global orders:', resp.status, errText);
      } catch(e) {
        console.error('Error fetching global orders:', e);
      }
      return [];
    }

    async function readGlobalOrdersForLastCustomer(){
      try{
        const lastOrder = JSON.parse(localStorage.getItem('bk_last_order') || 'null');
        const email = lastOrder?.email;
        if(!email) return await readAllGlobalOrders();
        const resp = await fetch(`/api/orders?email=${encodeURIComponent(email)}`);
        if(!resp.ok){
          const errText = await resp.text().catch(() => '');
          console.error('Failed to fetch orders by email:', resp.status, errText);
          return await readAllGlobalOrders();
        }
        const globalOrders = await resp.json();
        return Array.isArray(globalOrders) ? globalOrders : [];
      }catch(e){
        console.error('Error fetching orders by email:', e);
        return await readAllGlobalOrders();
      }
    }

    async function readAllOrders(){
      const localOrders = readOrders();
      const globalOrders = await readGlobalOrdersForLastCustomer();
      const byId = new Map();
      for(const order of [...globalOrders, ...localOrders]){
        const id = order.orderId || order.orderNumber || order.id || `${order.email || ''}-${order.createdAt || order.savedAt || ''}`;
        byId.set(id, order);
      }
      return Array.from(byId.values());
    }

    function formatCurrency(n){
      const num = Number(n);
      if(isNaN(num)) return '$0.00';
      return '$' + num.toFixed(2);
    }

    function getOrderItems(order){
      return Array.isArray(order?.items)
        ? order.items
        : Array.isArray(order?.purchasedItems)
          ? order.purchasedItems
          : [];
    }

    function getOrderTotals(order){
      const items = getOrderItems(order);
      const itemSubtotal = items.reduce((sum, it) => sum + (Number(it?.price || it?.unitPrice || 0) * Number(it?.quantity || it?.qty || 1)), 0);
      const storedSubtotal = Number(order?.subtotal ?? order?.subTotal);
      const subtotal = items.length && Number.isFinite(itemSubtotal) ? itemSubtotal : (Number.isFinite(storedSubtotal) ? storedSubtotal : 0);
      const deliveryFee = String(order?.method || order?.pickupOrDelivery || '').toLowerCase() === 'delivery' ? 10 : 0;
      const total = items.length ? subtotal + deliveryFee : (Number(order?.total || order?.totalPaid || order?.amount || 0) || 0);
      return { subtotal, deliveryFee, total };
    }

    function formatOrderDateTime(dateStr){
      if(!dateStr) return '—';
      const d = new Date(dateStr);
      if(isNaN(d.getTime())) return '—';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[d.getMonth()];
      const day = d.getDate();
      const year = d.getFullYear();
      let hours = d.getHours();
      const minutes = d.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minStr = minutes < 10 ? '0'+minutes : minutes;
      return `${month} ${day}, ${year} at ${hours}:${minStr} ${ampm}`;
    }

    function formatScheduleTime(scheduleStr){
      if(!scheduleStr) return 'N/A — not specified';
      
      // Handle "YYYY-MM-DD at HH:MM" format
      const isoMatch = scheduleStr.match(/^(\d{4}-\d{2}-\d{2})\s*at\s*(\d{1,2}:\d{2})$/);
      if(isoMatch){
        const date = new Date(isoMatch[1] + 'T' + isoMatch[2]);
        if(!isNaN(date.getTime())){
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const month = months[date.getMonth()];
          const day = date.getDate();
          const year = date.getFullYear();
          let hours = date.getHours();
          const minutes = date.getMinutes();
          const ampm = hours >= 12 ? 'PM' : 'AM';
          hours = hours % 12 || 12;
          const minStr = minutes < 10 ? '0'+minutes : minutes;
          return `${month} ${day}, ${year} at ${hours}:${minStr} ${ampm}`;
        }
      }
      
      // Try parsing as a full date string
      const d = new Date(scheduleStr);
      if(isNaN(d.getTime())) return scheduleStr;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[d.getMonth()];
      const day = d.getDate();
      const year = d.getFullYear();
      let hours = d.getHours();
      const minutes = d.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minStr = minutes < 10 ? '0'+minutes : minutes;
      return `${month} ${day}, ${year} at ${hours}:${minStr} ${ampm}`;
    }

    function escapeHtml(str){
      if(!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getFirstName(name){
      const first = String(name || '').trim().split(/\s+/)[0];
      return first || 'there';
    }

function emailLink(email, name){
       const emailValue = String(email || '').trim();
       if(!emailValue || emailValue === '—') return '—';
       const firstName = String(name || '').trim().split(/\s+/)[0] || 'there';
       const body = `Hello ${firstName},\n\nYour order is ready for pickup.\n\nThank you,\nB&KERY`;
       const gmailLink = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(emailValue)}&su=${encodeURIComponent("Your B&KERY Order")}&body=${encodeURIComponent(body)}`;
       return `<a href="${gmailLink}" target="_blank" style="color:var(--brown)">${escapeHtml(emailValue)}</a>`;
     }

    function statusClass(status){
      switch((status||'').toLowerCase()){
        case 'preparing': return 'status-preparing';
        case 'ready for pickup': return 'status-ready';
        case 'delivered': return 'status-completed';
        case 'completed': return 'status-completed';
        default: return 'status-order-received';
      }
    }

    function renderEmpty(){
      const container = document.getElementById('orders-list');
      const filter = document.querySelector('.filter-btn.active')?.getAttribute('data-filter') || 'all';
      if(filter === 'pending'){
        container.innerHTML = `
          <div class="empty-state" role="status">
            <div class="empty-ill">📝</div>
            <h3 style="margin:0;color:var(--brown)">No pending orders</h3>
            <p style="margin:0;color:var(--lighter-black)">You have no incomplete orders. Start shopping to create one.</p>
            <div style="margin-top:12px"><a href="index.html" class="btn btn-brown">Return to Menu</a></div>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="empty-state" role="status">
            <div class="empty-ill">🍞</div>
            <h3 style="margin:0;color:var(--brown)">You have no orders yet</h3>
            <p style="margin:0;color:var(--lighter-black)">Looks like your basket is still empty.</p>
            <div style="margin-top:12px"><a href="index.html" class="btn btn-brown">Return to Menu</a></div>
          </div>
        `;
      }
    }

    function renderOrders(list, isPending = false){
      const container = document.getElementById('orders-list');
      container.innerHTML = '';
      list.forEach(order => {
        const card = document.createElement('article');
        card.className = 'order-card';
        const orderNumberDisplay = order.orderNumber ? `#${order.orderNumber}` : (order.orderId || order.id || 'Pending');
        const date = formatOrderDateTime(order.dateOrdered || order.date || order.savedAt || order.createdAt);
        const { total } = getOrderTotals(order);
        const method = order.pickupOrDelivery || order.method || 'Pickup';
        const status = order.status || 'Order Received';

        if(isPending){
          const subtotal = (order.items || []).reduce((sum, it) => sum + (Number(it.price) || 0) * (Number(it.quantity) || 1), 0);
          const deliveryFee = method === 'Delivery' ? 10 : 0;
          const computedTotal = subtotal + deliveryFee;
          card.innerHTML = `
            <div class="order-summary">
              <div class="order-meta">
                <div class="order-number">Incomplete Order</div>
                <div class="order-date">${date}</div>
                <div class="order-total">${formatCurrency(computedTotal)}</div>
                <div class="order-method">${method}</div>
              </div>
            </div>
            <div class="order-actions">
              <div class="status-badge status-pending">Pending</div>
              <button class="btn btn-outline continue-checkout" data-order-id="${order.id}">Continue Checkout</button>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="order-summary">
              <div class="order-meta">
                 <div class="order-number">${orderNumberDisplay}</div>
                <div class="order-date">${date}</div>
                <div class="order-total">${formatCurrency(total)}</div>
                <div class="order-method">${method}</div>
                <div class="notice">Karen will keep you updated by email as your order progresses.</div>
              </div>
            </div>
            <div class="order-actions">
              <div class="status-badge ${statusClass(status)}">${status}</div>
              <button class="btn btn-outline details-toggle" aria-expanded="false">View Details</button>
            </div>
          `;
        }

        const details = document.createElement('div');
        details.className = 'details-panel';
        details.style.display = 'block';
        let itemsHtml = '';
        (order.purchasedItems || order.items || []).forEach(it => {
          const qty = Number(it.quantity || it.qty || 1);
          const name = it.name || it.productName || 'Item';
          const price = Number(it.price || it.unitPrice || 0);
          const itemTotal = (price * qty).toFixed(2);
          itemsHtml += `<div class="item-row"><div class="item-left">${qty} × ${name}</div><div class="item-right">$${itemTotal}</div></div>`;
        });

        const customerName = order.customerName || order.name || '—';
        const customerEmail = order.customerEmail || order.email || '—';
        const customerPhone = order.phone || order.customerPhone || '—';
        const customerInfo = `
          <div style="margin-top:12px"><strong>Customer Info</strong>
            <div>${escapeHtml(customerName)}</div>
            <div>${emailLink(customerEmail, customerName)}</div>
            <div>${escapeHtml(customerPhone)}</div>
          </div>
        `;

const orderInfo = `
           <div style="margin-top:12px"><strong>Order Info</strong>
             <div>Method: ${method}</div>
             <div>Requested Date/Time: ${formatScheduleTime(order.schedule)}</div>
             <div>Special Instructions: ${order.notes || order.specialInstructions || 'N/A — not provided'}</div>
             ${method.toLowerCase().startsWith('deliver') ? `<div>Address: ${order.address || '—'}</div>` : ''}
           </div>
         `;

        if(isPending){
          details.innerHTML = `<div class="items-list">${itemsHtml || '<div style="color:#6d4a2d">No items listed</div>'}</div>${customerInfo}${orderInfo}`;
          card.appendChild(details);
        } else {
          const paymentInfo = `
            <div style="margin-top:12px"><strong>Payment</strong>
              <div>Status: ${order.paymentStatus || order.status || 'Paid'}</div>
              <div>PayPal Transaction ID: ${order.paypalTransactionId || order.paymentId || order.transactionId || '—'}</div>
            </div>
          `;
          details.innerHTML = `<div class="items-list">${itemsHtml || '<div style="color:#6d4a2d">No items listed</div>'}</div>${customerInfo}${orderInfo}${paymentInfo}`;
          card.appendChild(details);
          const detailsToggle = card.querySelector('.details-toggle');
          if(detailsToggle){
            detailsToggle.addEventListener('click', function(){
              const expanded = this.getAttribute('aria-expanded') === 'true';
              this.setAttribute('aria-expanded', String(!expanded));
              details.style.display = expanded ? 'none' : 'block';
            });
          }
        }

        if(isPending){
          const continueBtn = card.querySelector('.continue-checkout');
          if(continueBtn){
            continueBtn.addEventListener('click', function(){
              const orderId = this.getAttribute('data-order-id');
              const pending = readPendingOrders();
              const pendingOrder = pending.find(o => o.id === orderId);
              if(pendingOrder){
                const cart = pendingOrder.items || [];
                localStorage.setItem('bk_cart', JSON.stringify(cart));
                const formValues = {
                  name: pendingOrder.customerName,
                  phone: pendingOrder.customerPhone,
                  email: pendingOrder.customerEmail,
                  method: pendingOrder.pickupOrDelivery,
                  address: pendingOrder.address,
                  pickupLocation: pendingOrder.pickupLocation,
                  city: pendingOrder.city,
                  state: pendingOrder.state,
                  zip: pendingOrder.zip,
                  scheduleDate: pendingOrder.scheduleDate,
                  scheduleTime: pendingOrder.scheduleTime,
                  notes: pendingOrder.notes
                };
                const idx = pending.findIndex(o => o.id === orderId);
                if(idx >= 0) pending.splice(idx, 1);
                localStorage.setItem('bk_pending_orders', JSON.stringify(pending));
                sessionStorage.setItem('bakery_order', JSON.stringify(formValues));
                window.location.href = 'cart.html';
              }
            });
          }
        }

        container.appendChild(card);
      });
    }

    function applySearchAndFilter(all){
      const q = (document.getElementById('orders-search').value || '').trim().toLowerCase();
      const filter = document.querySelector('.filter-btn.active')?.getAttribute('data-filter') || 'all';
      let list = all.slice();
      if(filter === 'active'){
        list = list.filter(o => !( (o.status||'').toLowerCase() === 'completed' || (o.status||'').toLowerCase() === 'delivered'));
      } else if(filter === 'completed'){
        list = list.filter(o => (o.status||'').toLowerCase() === 'completed' || (o.status||'').toLowerCase() === 'delivered');
      } else if(filter === 'pending'){
        const pending = readPendingOrders();
        if(!q && pending.length > 0){
          list = pending;
        } else if (pending.length > 0) {
          list = pending.filter(o => {
            const orderId = (o.id||'').toLowerCase();
            const inItems = (o.items||[]).some(it => (it.name||'').toLowerCase().includes(q));
            return orderId.includes(q) || inItems;
          });
        }
      }
      if(q && filter !== 'pending'){
        list = list.filter(o => {
          const orderId = (o.orderNumber||o.orderId||'').toLowerCase();
          const inItems = (o.purchasedItems||o.items||[]).some(it => (it.name||it.productName||'').toLowerCase().includes(q));
          return orderId.includes(q) || inItems;
        });
      }
      if(list.length === 0){ renderEmpty(); return; }
      renderOrders(list, filter === 'pending');
    }

    function getSubmittedOrderCount(){
      try{
        const orders = readOrders() || [];
        return orders.filter(order => {
          const status = `${order.status || ''} ${order.paymentStatus || ''}`.toLowerCase();
          return !(status.includes('pending') || status.includes('draft') || status.includes('incomplete'));
        }).length;
      }catch(e){
        return 0;
      }
    }

    async function init(){
      const all = await readAllOrders();
      const searchInput = document.getElementById('orders-search');
      const filterBtns = document.querySelectorAll('.filter-btn');

      document.querySelectorAll('.cart-count').forEach(el => {
        try{ const cart = JSON.parse(localStorage.getItem('bk_cart')||'[]'); el.textContent = cart.reduce((s,it)=>s+(it.quantity||0),0); }catch(e){}
      });
      try { document.querySelectorAll('.orders-count').forEach(el => el.textContent = getSubmittedOrderCount()); } catch (e) {}

      if(!all || all.length === 0){ renderEmpty(); }
      else { applySearchAndFilter(all); }

      searchInput.addEventListener('input', () => applySearchAndFilter(all));
      filterBtns.forEach(btn => btn.addEventListener('click', (e) => {
        filterBtns.forEach(b=>b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        applySearchAndFilter(all);
      }));

      window.addEventListener('storage', async (ev) => {
        if(ev.key === STORAGE_KEY || ev.key === DRAFT_STORAGE_KEY || ev.key === 'bk_last_order'){
          const updated = await readAllOrders();
          document.querySelectorAll('.orders-count').forEach(el => el.textContent = getSubmittedOrderCount());
          applySearchAndFilter(updated);
        }
      });
      document.addEventListener('visibilitychange', async () => {
        if(document.visibilityState === 'visible'){
          const updated = await readAllOrders();
          document.querySelectorAll('.orders-count').forEach(el => el.textContent = getSubmittedOrderCount());
          applySearchAndFilter(updated);
        }
      });
    }

document.addEventListener('DOMContentLoaded', () => init());
   })();
 </script>
 <script>
 (function initProductSearch(){
   const searchToggles = Array.from(document.querySelectorAll('#search-toggle, #search-toggle-mobile'));
   const searchContainer = document.getElementById('search-container');
   const searchInput = document.getElementById('search-input');
   const searchClear = document.getElementById('search-clear');
   const searchResults = document.getElementById('search-results');
   const searchHint = document.getElementById('search-hint');

   if(searchToggles.length === 0 || !searchContainer || !searchInput || !searchResults) return;

   const bakeryProducts = [
     { name: 'Babka', id: 'babka' },
     { name: 'Challah', id: 'challah' },
     { name: 'Bagels', id: 'bagels' },
     { name: 'Bialys', id: 'bialys' },
     { name: 'Rugelach', id: 'rugelach' },
     { name: 'Almond Thumbprint Cookies', id: 'almond-cookies' },
     { name: 'Mandelbrot', id: 'mandelbrot' },
     { name: 'Macarons', id: 'macarons' },
     { name: 'Greater-Crumb Coffee Cake', id: 'coffee-cake' }
   ];

   let selectedIndex = -1;
   let currentResults = [];

   const toggleSearch = () => {
     const isOpen = searchContainer.getAttribute('aria-hidden') === 'false';
     if(isOpen){ closeSearch(); } else { openSearch(); }
   };

   const openSearch = () => {
     positionSearchContainer();
     searchContainer.setAttribute('aria-hidden', 'false');
     searchToggles.forEach(toggle => toggle.setAttribute('aria-expanded', 'true'));
     searchInput.focus();
   };

   const getVisibleSearchToggle = () => searchToggles.find(toggle => {
     const style = getComputedStyle(toggle);
     return style.display !== 'none' && style.visibility !== 'hidden' && toggle.getClientRects().length > 0;
   }) || searchToggles[0];

   const positionSearchContainer = () => {
     const toggle = getVisibleSearchToggle();
     if(!toggle) return;
     const toggleRect = toggle.getBoundingClientRect();
     const width = Math.min(320, Math.max(260, window.innerWidth - 16));
     const left = Math.max(8, toggleRect.right - width);
     searchContainer.style.position = 'fixed';
     searchContainer.style.top = toggleRect.bottom + 8 + 'px';
     searchContainer.style.width = width + 'px';
     searchContainer.style.left = left + 'px';
     searchContainer.style.right = 'auto';
   };

   const closeSearch = () => {
     searchContainer.setAttribute('aria-hidden', 'true');
     searchToggles.forEach(toggle => toggle.setAttribute('aria-expanded', 'false'));
     searchResults.innerHTML = '';
     selectedIndex = -1;
   };

   const filterProducts = (query) => {
     if(!query.trim()){
       searchResults.innerHTML = '';
       searchHint.style.display = 'block';
       selectedIndex = -1;
       return;
     }
     const lowerQuery = query.toLowerCase().trim();
     currentResults = bakeryProducts.filter(product => product.name.toLowerCase().includes(lowerQuery));
     selectedIndex = -1;
     renderResults();
   };

   const renderResults = () => {
     searchHint.style.display = 'none';
     searchResults.innerHTML = '';
     if(currentResults.length === 0){
       const emptyMsg = document.createElement('div');
       emptyMsg.className = 'search-empty';
       emptyMsg.textContent = 'No matching treats found.';
       searchResults.appendChild(emptyMsg);
       return;
     }
     currentResults.forEach((product, index) => {
       const item = document.createElement('button');
       item.type = 'button';
       item.className = 'search-result-item';
       item.textContent = product.name;
       item.setAttribute('data-index', index);
       item.addEventListener('click', () => selectResult(index));
       searchResults.appendChild(item);
     });
   };

   const selectResult = (index) => {
     if(index < 0 || index >= currentResults.length) return;
     window.location.href = 'index.html#menu';
     closeSearch();
     searchInput.value = '';
   };

   const updateSelection = (newIndex) => {
     if(currentResults.length === 0) return;
     if(newIndex < 0) newIndex = currentResults.length - 1;
     if(newIndex >= currentResults.length) newIndex = 0;
     selectedIndex = newIndex;
     document.querySelectorAll('.search-result-item[data-selected]').forEach(item => {
       item.removeAttribute('data-selected');
     });
     const selected = document.querySelector(`.search-result-item[data-index="${selectedIndex}"]`);
     if(selected){
       selected.setAttribute('data-selected', '');
       selected.scrollIntoView({ block: 'nearest' });
     }
   };

   searchToggles.forEach(toggle => toggle.addEventListener('click', toggleSearch));
   window.addEventListener('resize', positionSearchContainer);
   searchInput.addEventListener('input', (e) => filterProducts(e.target.value));
   searchClear.addEventListener('click', (e) => {
     e.preventDefault();
     searchInput.value = '';
     searchResults.innerHTML = '';
     searchHint.style.display = 'block';
     selectedIndex = -1;
     searchInput.focus();
   });
   searchInput.addEventListener('keydown', (e) => {
     if(e.key === 'Escape'){ closeSearch(); return; }
     if(e.key === 'ArrowDown'){ e.preventDefault(); updateSelection(selectedIndex + 1); return; }
     if(e.key === 'ArrowUp'){ e.preventDefault(); updateSelection(selectedIndex - 1); return; }
     if(e.key === 'Enter'){ e.preventDefault(); if(selectedIndex >= 0) selectResult(selectedIndex); return; }
   });
   document.addEventListener('click', (e) => {
     if(!searchContainer.contains(e.target) && !searchToggles.some(toggle => toggle.contains(e.target))){
       if(searchContainer.getAttribute('aria-hidden') === 'false'){ closeSearch(); }
     }
   });
   document.addEventListener('keydown', (e) => {
     if(e.key === 'Escape' && searchContainer.getAttribute('aria-hidden') === 'false'){ closeSearch(); }
   });
 })();
 </script>
